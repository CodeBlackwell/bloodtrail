<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloodTrail — AD Attack Path Discovery</title>
  <meta name="description" content="Active Directory attack path discovery and exploitation toolkit. Extends BloodHound with pre-auth enumeration, credential pipelines, and automated command generation.">
  <meta name="theme-color" content="#08080e">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="BloodTrail — Follow the Trail">
  <meta property="og:description" content="AD attack path discovery toolkit. Extends BloodHound with pre-auth enumeration, credential pipelines, and automated chain detection.">
  <meta property="og:image" content="https://bloodtrail.codeblackwell.ai/static/og.png">
  <meta property="og:url" content="https://bloodtrail.codeblackwell.ai">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BloodTrail — Follow the Trail">
  <meta name="twitter:description" content="AD attack path discovery toolkit. Extends BloodHound with pre-auth enumeration, credential pipelines, and automated chain detection.">
  <meta name="twitter:image" content="https://bloodtrail.codeblackwell.ai/static/og.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://d3js.org">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://d3js.org/d3.v7.min.js" defer></script>
</head>
<body class="white-hot">

  <header>
    <div class="header-left">
      <span class="logo">BLOODTRAIL</span>
      <button class="upload-btn" id="btn-upload">Upload SharpHound</button>
      <button class="download-btn" id="btn-download">Download Results</button>
    </div>
    <div class="header-center">
      <div class="polarity-toggle">
        <button id="btn-bh" class="polarity-bh">Black-Hot</button>
        <button id="btn-wh" class="active polarity-wh">White-Hot</button>
      </div>
    </div>
    <div class="header-controls">
      <div class="edge-filter-toggle">
        <button class="active" data-filter="attacks">Attacks</button>
        <button data-filter="all">All</button>
      </div>
      <div class="layout-toggle">
        <button class="active" data-layout="htree">H-Tree</button>
        <button data-layout="vtree">V-Tree</button>
        <button data-layout="force">Force</button>
      </div>
    </div>
  </header>

  <main class="split-view">
    <section class="panel" id="left-panel">
      <span class="panel-label">BLOODHOUND RAW</span>
      <svg id="left-svg"></svg>
      <div class="legend" id="legend-left">
        <div class="legend-section">
          <div class="legend-item"><svg width="10" height="10" viewBox="-8 -8 16 16"><polygon points="0,-7 6.7,3.5 -6.7,3.5" fill="var(--node-da)"/></svg>Domain</div>
          <div class="legend-item"><svg width="10" height="10" viewBox="-8 -8 16 16"><rect x="-5" y="-5" width="10" height="10" fill="var(--node-computer)"/></svg>Computer</div>
          <div class="legend-item"><svg width="10" height="10" viewBox="-8 -8 16 16"><polygon points="0,-6 6,0 0,6 -6,0" fill="var(--node-group)"/></svg>Group</div>
          <div class="legend-item"><svg width="10" height="10" viewBox="-8 -8 16 16"><circle r="5" fill="var(--node-user)"/></svg>User</div>
        </div>
        <div class="legend-section">
          <div class="legend-item"><div class="legend-line" style="background:var(--edge-access)"></div>Access</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--edge-acl)"></div>ACL</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--edge-cred)"></div>Cred</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--edge-deleg)"></div>Deleg</div>
          <div class="legend-item"><div class="legend-line" style="background:var(--edge-member);opacity:0.5"></div>Member</div>
        </div>
      </div>
    </section>
    <div class="divider"></div>
    <section class="panel" id="right-panel">
      <span class="panel-label">BLOODTRAIL ENHANCED</span>
      <svg id="right-svg"></svg>
      <div id="chain-sidebar"></div>
    </section>
  </main>

  <footer>
    <span><span class="stat-value" id="stat-chains">0</span> chains detected</span>
    <span><span class="stat-value" id="stat-quickwins">0</span> quick wins</span>
    <span><span class="stat-value" id="stat-nodes">0</span> nodes</span>
    <span class="footer-note">*dimmed steps = existing state, no action needed</span>
  </footer>

  <div id="upload-overlay">
    <div id="upload-zone">
      <p>Drop SharpHound ZIP or JSON here</p>
      <p style="font-size:0.7rem;margin-top:0.5rem;color:var(--text-faint)">or click to browse</p>
      <input type="file" id="file-input" accept=".zip,.json">
    </div>
  </div>

  <div id="execution-chain" class="execution-chain"></div>

  <div class="bt-tooltip" id="tooltip"></div>

  <script src="/static/graph.js" defer></script>
  <script src="/static/enhance.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    let currentData = null;

    async function loadSample() {
      const res = await fetch('/api/sample');
      currentData = await res.json();
      render(currentData);
    }

    // --- Intro cycle ---
    let introTimer = null;
    let introActive = false;
    let introIndex = 0;

    function startIntroCycle() {
      introActive = true;
      introTimer = setTimeout(cycleNext, 2000);
    }

    function cycleNext() {
      if (!introActive) return;
      const chains = BloodTrailEnhance.getSortedChains();
      if (!chains.length) { introActive = false; return; }
      BloodTrailEnhance.highlightChain(chains[introIndex % chains.length].id);
      introIndex++;
      introTimer = setTimeout(cycleNext, 6000);
    }

    function stopIntro() {
      if (!introActive) return;
      clearTimeout(introTimer);
      introTimer = null;
      introActive = false;
      introListeners.forEach(([evt, fn]) => document.removeEventListener(evt, fn));
      introListeners = [];
    }

    let introListeners = ['click', 'wheel', 'keydown'].map(evt => {
      const fn = () => stopIntro();
      document.addEventListener(evt, fn, { once: true });
      return [evt, fn];
    });

    function render(data) {
      document.getElementById('stat-chains').textContent = (data.chains || []).length;
      document.getElementById('stat-quickwins').textContent = (data.quick_wins || []).length;
      document.getElementById('stat-nodes').textContent = (data.nodes || []).length;
      BloodTrailGraph.initGraph(data);
      BloodTrailEnhance.applyEnhancements(data);
      startIntroCycle();
    }

    // Polarity toggle
    const btnWh = document.getElementById('btn-wh');
    const btnBh = document.getElementById('btn-bh');
    btnWh.addEventListener('click', () => {
      document.body.className = 'white-hot';
      btnWh.classList.add('active');
      btnBh.classList.remove('active');
      BloodTrailEnhance.updateHeatTrailColors('white-hot');
    });

    btnBh.addEventListener('click', () => {
      document.body.className = 'black-hot';
      btnBh.classList.add('active');
      btnWh.classList.remove('active');
      BloodTrailEnhance.updateHeatTrailColors('black-hot');
    });

    // Download results — raw SharpHound data + BloodTrail-enhanced analysis
    document.getElementById('btn-download').addEventListener('click', async () => {
      if (!currentData) return;

      const raw = { meta: currentData.meta, nodes: currentData.nodes, edges: currentData.edges };
      const enhanced = currentData;

      // Use JSZip-free minimal ZIP builder
      const zip = buildZip({
        'sharphound-raw.json': JSON.stringify(raw, null, 2),
        'bloodtrail-enhanced.json': JSON.stringify(enhanced, null, 2),
      });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(zip);
      a.download = 'bloodtrail-results.zip';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Minimal ZIP builder — no dependencies
    function buildZip(files) {
      const entries = Object.entries(files);
      const encoder = new TextEncoder();
      const parts = [];
      const directory = [];
      let offset = 0;

      for (const [name, content] of entries) {
        const nameBytes = encoder.encode(name);
        const dataBytes = encoder.encode(content);
        const crc = crc32(dataBytes);

        // Local file header
        const local = new Uint8Array(30 + nameBytes.length);
        const lv = new DataView(local.buffer);
        lv.setUint32(0, 0x04034b50, true);  // signature
        lv.setUint16(4, 20, true);           // version needed
        lv.setUint16(8, 8, true);            // UTF-8 flag
        lv.setUint32(14, crc, true);
        lv.setUint32(18, dataBytes.length, true);  // compressed
        lv.setUint32(22, dataBytes.length, true);  // uncompressed
        lv.setUint16(26, nameBytes.length, true);
        local.set(nameBytes, 30);

        // Central directory entry
        const central = new Uint8Array(46 + nameBytes.length);
        const cv = new DataView(central.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(10, 8, true);
        cv.setUint32(16, crc, true);
        cv.setUint32(20, dataBytes.length, true);
        cv.setUint32(24, dataBytes.length, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint32(42, offset, true);
        central.set(nameBytes, 46);

        parts.push(local, dataBytes);
        directory.push(central);
        offset += local.length + dataBytes.length;
      }

      const dirOffset = offset;
      let dirSize = 0;
      for (const d of directory) { parts.push(d); dirSize += d.length; }

      // End of central directory
      const end = new Uint8Array(22);
      const ev = new DataView(end.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(8, entries.length, true);
      ev.setUint16(10, entries.length, true);
      ev.setUint32(12, dirSize, true);
      ev.setUint32(16, dirOffset, true);
      parts.push(end);

      return new Blob(parts, { type: 'application/zip' });
    }

    function crc32(bytes) {
      let crc = ~0;
      for (let i = 0; i < bytes.length; i++) {
        crc ^= bytes[i];
        for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
      }
      return (~crc) >>> 0;
    }

    // Upload
    const overlay = document.getElementById('upload-overlay');
    const zone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');

    document.getElementById('btn-upload').addEventListener('click', () => {
      overlay.classList.add('visible');
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('visible');
    });

    zone.addEventListener('click', () => fileInput.click());

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragover');
    });

    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));

    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    const MAX_UPLOAD_MB = 50;
    async function uploadFile(file) {
      if (file.size > MAX_UPLOAD_MB * 1024 * 1024) {
        zone.querySelector('p').textContent = `File too large (max ${MAX_UPLOAD_MB} MB)`;
        return;
      }
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['zip', 'json'].includes(ext)) {
        zone.querySelector('p').textContent = 'Invalid file type. Use .zip or .json';
        return;
      }
      const form = new FormData();
      form.append('file', file);
      zone.querySelector('p').textContent = 'Processing...';
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        if (!res.ok) throw new Error((await res.json()).detail || 'Upload failed');
        currentData = await res.json();
        overlay.classList.remove('visible');
        render(currentData);
      } catch (err) {
        zone.querySelector('p').textContent = 'Error: ' + err.message;
      }
    }

    // Edge filter toggle (event delegation — cached ref)
    const edgeFilterEl = document.querySelector('.edge-filter-toggle');
    const edgeFilterBtns = edgeFilterEl.querySelectorAll('button');
    edgeFilterEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      edgeFilterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      BloodTrailGraph.setEdgeFilter(btn.dataset.filter);
    });

    // Layout toggle (event delegation — cached ref)
    const layoutEl = document.querySelector('.layout-toggle');
    const layoutBtns = layoutEl.querySelectorAll('button');
    layoutEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      layoutBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      BloodTrailGraph.setLayout(btn.dataset.layout);
    });

    loadSample();
    });
  </script>
</body>
</html>

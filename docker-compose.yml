services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/bloodtrail
    volumes:
      - neo4j_data:/data

  bloodtrail:
    build: .
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: bloodtrail
    volumes:
      - ./data:/data
    entrypoint: ["sleep", "infinity"]

volumes:
  neo4j_data:
